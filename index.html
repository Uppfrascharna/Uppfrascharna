<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uppfräscharna</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    h1, h2, h3 {
      margin: 0;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    /* LOGO */
    .logo {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 10px;
    }

    .logo img {
      width: 130px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-top: 20px;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .btn {
      background: #22c55e;
      padding: 12px 25px;
      border-radius: 30px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      display: inline-block;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    /* PAKET */
    .packages {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .package {
      background: white;
      color: black;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .package:hover {
      transform: translateY(-8px);
    }

    .icon {
      font-size: 35px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 22px;
      margin: 10px 0;
      font-weight: bold;
    }

    /* FORM */
    .form {
      margin-top: 60px;
      background: white;
      color: black;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 30px;
      background: #22c55e;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      margin-top: 50px;
      opacity: 0.6;
      font-size: 14px;
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo">
      <img src="logo.png" alt="logo">
    </div>

    <!-- HERO -->
    <div class="hero">
      <h1>Uppfräscharna</h1>
      <p>Vi gör din bil som ny igen ✨</p>
      <a href="#bokning" class="btn">Boka nu</a>
    </div>

    <!-- PAKET -->
    <div class="packages">

      <div class="package">
        <div class="icon">✨</div>
        <h3>Bas</h3>
        <p>Snabb uppfräschning</p>
        <div class="price">299 kr</div>
      </div>

      <div class="package">
        <div class="icon">🚗</div>
        <h3>Standard</h3>
        <p>In & utvändig tvätt</p>
        <div class="price">599 kr</div>
      </div>

      <div class="package">
        <div class="icon">💎</div>
        <h3>Premium</h3>
        <p>Full rekond + skydd</p>
        <div class="price">999 kr</div>
      </div>

    </div>

    <!-- FORM -->
    <div class="form" id="bokning">
      <h2>Boka tid</h2>

      <form>
        <input type="text" placeholder="Namn" required>
        <input type="tel" placeholder="Telefon" required>

        <select required>
          <option value="">Välj paket</option>
          <option>Bas</option>
          <option>Standard</option>
          <option>Premium</option>
        </select>

        <input type="date" required>

        <textarea placeholder="Övrigt..."></textarea>

        <button type="submit">Boka nu</button>
      </form>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      © 2026 Uppfräscharna
    </div>

  </div>

</body>
</html>
