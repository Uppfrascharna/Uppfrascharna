<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uppfräscharna</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8fafc;
  color: #1e293b;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.logo {
  text-align: center;
  margin-top: 30px;
}

.logo img {
  width: 120px;
}

.hero {
  text-align: center;
  margin: 30px 0;
}

.hero h1 {
  font-size: 32px;
}

.hero p {
  color: #64748b;
}

.btn {
  background: #16a34a;
  color: white;
  padding: 12px 25px;
  border-radius: 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
}

.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  margin-top: 40px;
}

.service {
  background: white;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.icon {
  font-size: 30px;
  margin-bottom: 10px;
}

.form {
  background: white;
  margin-top: 50px;
  padding: 25px;
  border-radius: 15px;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 30px;
  background: #16a34a;
  color: white;
  font-size: 16px;
}

.footer {
  text-align: center;
  margin-top: 40px;
  color: #94a3b8;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">
  <img src="IMG_9427.png" alt="logo">
</div>

<div class="hero">
  <h1>Uppfräscharna</h1>
  <p>Vi gör ditt hem fräscht, rent och som nytt ✨</p>
  <a href="#bokning" class="btn">Boka tjänst</a>
</div>

<div class="services">

  <div class="service">
    <div class="icon">🧼</div>
    <h3>Städning</h3>
    <p>Hemstädning och storstädning</p>
  </div>

  <div class="service">
    <div class="icon">🌿</div>
    <h3>Trädgård</h3>
    <p>Klippning & uppfräschning</p>
  </div>

  <div class="service">
    <div class="icon">🏡</div>
    <h3>Fastighet</h3>
    <p>Allmän uppfräschning & fix</p>
  </div>

</div>

<div class="form" id="bokning">
  <h2>Boka</h2>

  <form>
    <input type="text" placeholder="Namn" required>
    <input type="tel" placeholder="Telefon" required>

    <select required>
      <option>Välj tjänst</option>
      <option>Städning</option>
      <option>Trädgård</option>
      <option>Fastighet</option>
    </select>

    <textarea placeholder="Beskriv vad du behöver hjälp med"></textarea>

    <button>Boka</button>
  </form>
</div>

<div class="footer">
  © Uppfräscharna
</div>

</div>

</body>
</html>
