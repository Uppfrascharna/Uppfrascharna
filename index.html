<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uppfräscharna</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    /* LOGO */
    .logo {
      text-align: center;
      margin-top: 30px;
    }

    .logo img {
      width: 140px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-top: 20px;
    }

    .hero h1 {
      font-size: 38px;
    }

    .hero p {
      opacity: 0.8;
      margin-top: 10px;
      margin-bottom: 25px;
    }

    .btn {
      background: gold;
      color: black;
      padding: 12px 25px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* TJÄNSTER */
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .service {
      background: white;
      color: black;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .service:hover {
      transform: translateY(-8px);
    }

    .icon {
      font-size: 35px;
      margin-bottom: 10px;
    }

    .price {
      font-weight: bold;
      margin-top: 10px;
    }

    /* FORM */
    .form {
      margin-top: 60px;
      background: white;
      color: black;
      padding: 30px;
      border-radius: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 30px;
      background: gold;
      font-weight: bold;
      cursor: pointer;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      margin-top: 40px;
      opacity: 0.6;
    }

  </style>
</head>
<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="IMG_9427.png" alt="logo">
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Uppfräscharna</h1>
    <p>Vi gör ditt hem skinande rent och fräscht ✨</p>
    <a href="#bokning" class="btn">Boka nu</a>
  </div>

  <!-- TJÄNSTER -->
  <div class="services">

    <div class="service">
      <div class="icon">🧹</div>
      <h3>Hemstädning</h3>
      <p>Grundlig städning av hela hemmet</p>
      <div class="price">Från 299 kr</div>
    </div>

    <div class="service">
      <div class="icon">✨</div>
      <h3>Flyttstädning</h3>
      <p>Perfekt inför inflytt/utflytt</p>
      <div class="price">Från 999 kr</div>
    </div>

    <div class="service">
      <div class="icon">🪟</div>
      <h3>Fönsterputs</h3>
      <p>Skinande rena fönster</p>
      <div class="price">Från 199 kr</div>
    </div>

  </div>

  <!-- FORM -->
  <div class="form" id="bokning">
    <h2>Boka tjänst</h2>

    <form>
      <input type="text" placeholder="Namn" required>
      <input type="tel" placeholder="Telefon" required>

      <select required>
        <option value="">Välj tjänst</option>
        <option>Hemstädning</option>
        <option>Flyttstädning</option>
        <option>Fönsterputs</option>
      </select>

      <input type="date" required>

      <textarea placeholder="Meddelande..."></textarea>

      <button type="submit">Skicka bokning</button>
    </form>
  </div>

  <div class="footer">
    © 2026 Uppfräscharna
  </div>

</div>

</body>
</html>
